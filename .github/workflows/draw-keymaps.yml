name: Draw keymaps

on:
  workflow_dispatch:
    inputs:
      combined_layers:
        description: 'Draw all layers combined on single image'
        required: false
        type: boolean
        default: false
  push:
    paths:
      - "config/*.keymap"
      - "config/*.dtsi"
      - "keymap_drawer.config.yaml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: "config/*.keymap"
      config_path: "keymap_drawer.config.yaml"
      output_folder: "keymap-drawer"
      parse_args: ""
      draw_args: ""

  draw-combined:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pipx install keymap-drawer

      - name: Draw combined keymap
        run: |
          mkdir -p keymap-drawer
          config_arg=""
          [ -e "keymap_drawer.config.yaml" ] && config_arg="-c keymap_drawer.config.yaml"
          
          for keymap_file in config/*.keymap; do
            keyboard=$(basename -s .keymap "$keymap_file")
            keymap $config_arg parse -z "$keymap_file" > "keymap-drawer/${keyboard}.yaml"
            keymap -c keymap_drawer.combined.yaml draw "keymap-drawer/${keyboard}.yaml" > "keymap-drawer/${keyboard}-combined.svg"
          done

      - name: Commit updated images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'keymap-drawer/*.svg keymap-drawer/*.yaml'
          commit_message: 'keymap-drawer render (combined)'
